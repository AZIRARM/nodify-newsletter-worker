<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{schedule.title}">Schedule Campaign - Nodify Newsletter</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .schedule-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .schedule-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        .schedule-card h2 {
            color: #1e293b;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #64748b;
            font-size: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .lang-switch {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .lang-switch a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
</head>

<body>
    <div class="container schedule-container">
        <div class="lang-switch">
            <a href="?lang=fr">🇫🇷 Français</a> |
            <a href="?lang=en">🇬🇧 English</a> |
            <a href="?lang=es">🇪🇸 Español</a> |
            <a href="?lang=de">🇩🇪 Deutsch</a> |
            <a href="?lang=pt">🇵🇹 Português</a>
        </div>

        <div class="schedule-card">
            <h2><i class="fas fa-calendar-alt"></i> <span th:text="#{schedule.title}">Schedule Campaign</span></h2>
            <p th:text="#{schedule.campaign} + ': ' + ${campaign.name}" style="margin-bottom: 20px; color: #64748b;">
                Campaign: <strong th:text="${campaign.name}">-</strong></p>

            <form th:action="@{/campaign/{id}/schedule(id=${campaign.id})}" method="post">
                <div class="form-group">
                    <label th:text="#{schedule.scheduled_start}">Scheduled Start</label>
                    <input type="datetime-local" name="scheduledStart" th:value="${campaign.scheduledStart}">
                    <small th:text="#{schedule.start_help}">Leave empty to start immediately</small>
                </div>

                <div class="form-group">
                    <label th:text="#{schedule.retry_interval}">Auto-retry interval (minutes)</label>
                    <input type="number" name="retryIntervalMinutes" th:value="${campaign.retryIntervalMinutes}" min="0"
                        step="5">
                    <small th:text="#{schedule.retry_help}">0 = no auto-retry. Non-opened users will be retried after
                        this interval</small>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" name="active" th:checked="${campaign.active}" value="true">
                    <label th:text="#{schedule.active}">Active (enable auto-retry)</label>
                </div>

                <button type="submit" class="btn-save"><i class="fas fa-save"></i> <span th:text="#{schedule.save}">Save
                        Settings</span></button>
            </form>

            <a href="/campaigns" class="btn-back"><i class="fas fa-arrow-left"></i> <span
                    th:text="#{dashboard.back}">Back to Campaigns</span></a>
        </div>
    </div>
</body>

</html>
