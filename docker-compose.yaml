version: '3.8'

services:
  newsletter:
    build: .
    ports:
      - "80:80"
    environment:
      - NODIFY_API_URL=${NODIFY_API_URL:-https://nodify-api.azirar.ovh}
      - NODIFY_API_SECRET=${NODIFY_API_SECRET:-}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - TRACKING_BASE_URL=${TRACKING_BASE_URL:-http://localhost}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
