<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/schedule-form.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-calendar-alt"></i> Schedule Campaign</h2>
            <p style="margin-bottom: 20px; color: #64748b;">Campaign: <strong th:text="${campaign.name}">-</strong></p>

            <form th:action="@{/campaign/{id}/schedule(id=${campaign.id})}" method="post">
                <div class="form-group">
                    <label>Scheduled Start</label>
                    <input type="datetime-local" name="scheduledStart" th:value="${campaign.scheduledStart}">
                    <small>Leave empty to start immediately</small>
                </div>

                <div class="form-group">
                    <label>Auto-retry interval (minutes)</label>
                    <input type="number" name="retryIntervalMinutes" th:value="${campaign.retryIntervalMinutes}" min="0"
                        step="5">
                    <small>0 = no auto-retry</small>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" name="active" th:checked="${campaign.active}" value="true">
                    <label>Active (enable auto-retry)</label>
                </div>

                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Settings</button>
            </form>

            <a href="/campaigns" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Campaigns</a>
        </div>
    </div>
</body>

</html>
