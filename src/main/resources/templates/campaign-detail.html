<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{campaign.details} + ' - ' + ${campaign.name}">Campaign Details</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/campaign-detail.css">
</head>

<body>
    <input type="hidden" id="campaignId" th:value="${campaign.id}" />

    <div class="container">
        <div class="lang-switch">
            <a href="?lang=fr">🇫🇷 Français</a> |
            <a href="?lang=en">🇬🇧 English</a> |
            <a href="?lang=es">🇪🇸 Español</a> |
            <a href="?lang=de">🇩🇪 Deutsch</a> |
            <a href="?lang=pt">🇵🇹 Português</a>
        </div>

        <div class="action-buttons">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> <span
                    th:text="#{dashboard.back}">Back</span></a>
            <a th:href="@{/newsletter/{id}(id=${campaign.newsletter.id})}" class="view-newsletter-btn">
                <i class="fas fa-eye"></i> <span th:text="#{campaign.view_newsletter}">View Newsletter</span>
            </a>
        </div>

        <div class="detail-header">
            <h1><i class="fas fa-campaign"></i> <span th:text="${campaign.name}">Campaign Name</span></h1>
            <div class="detail-meta">
                <span th:text="#{campaign.status}">Status</span>: <strong th:text="${campaign.status}">-</strong> |
                <span th:text="#{campaign.created}">Created</span>: <strong
                    th:text="${#temporals.format(campaign.firstSentAt, 'dd/MM/yyyy HH:mm')}">-</strong>
            </div>
            <div class="detail-stats">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
                    <div class="stat-info">
                        <h3 id="totalSent">0</h3>
                        <p th:text="#{campaign.sent}">Sent</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-eye"></i></div>
                    <div class="stat-info">
                        <h3 id="totalOpened">0</h3>
                        <p th:text="#{campaign.opened}">Opened</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-info">
                        <h3 id="openRate">0%</h3>
                        <p th:text="#{campaign.rate}">Rate</p>
                    </div>
                </div>
            </div>
            <div class="detail-actions">
                <button class="retry-btn" th:if="${campaign.status == 'COMPLETED'}" onclick="retryCampaign()">
                    <i class="fas fa-sync-alt"></i> <span th:text="#{campaign.retry}">Retry</span>
                </button>
                <a th:href="@{/campaign/{id}/users(id=${campaign.id})}" class="manage-users-btn">
                    <i class="fas fa-users"></i> <span th:text="#{campaign.manage_users}">Manage Users</span>
                </a>
            </div>
        </div>

        <div class="users-table">
            <h3><i class="fas fa-users"></i> <span th:text="#{campaign.users}">User Status</span></h3>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th th:text="#{campaign.email}">Email</th>
                        <th th:text="#{campaign.name}">Name</th>
                        <th th:text="#{campaign.sent_at}">Sent At</th>
                        <th th:text="#{campaign.opened_at}">Opened At</th>
                        <th th:text="#{dashboard.status}">Status</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="5" class="loading"><span th:text="#{dashboard.loading}">Loading...</span></td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.campaignId = [[${ campaign.id }]];
        console.log('Campaign ID from server:', window.campaignId);
        /*]]>*/
    </script>
    <script src="/js/campaign-detail.js"></script>
</body>

</html>
