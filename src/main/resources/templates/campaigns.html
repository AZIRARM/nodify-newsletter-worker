<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{campaigns.title}">Campaigns - Nodify Newsletter</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
    <div class="container">
        <div class="lang-switch">
            <a href="?lang=fr">🇫🇷 Français</a> |
            <a href="?lang=en">🇬🇧 English</a> |
            <a href="?lang=es">🇪🇸 Español</a> |
            <a href="?lang=de">🇩🇪 Deutsch</a> |
            <a href="?lang=pt">🇵🇹 Português</a>
        </div>

        <div class="nav-links">
            <a href="/" class="nav-link"><i class="fas fa-tachometer-alt"></i> <span
                    th:text="#{dashboard.title}">Dashboard</span></a>
            <a href="/campaigns" class="nav-link active"><i class="fas fa-list"></i> <span
                    th:text="#{campaigns.title}">Campaigns</span></a>
        </div>

        <div class="header">
            <h1><i class="fas fa-campaign"></i> <span th:text="#{campaigns.title}">Campaigns</span></h1>
            <p th:text="#{campaigns.subtitle}">Manage all your email campaigns</p>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label th:text="#{campaigns.filter_status}">Status</label>
                <select id="statusFilter">
                    <option value="ALL" th:text="#{campaigns.all}">All</option>
                    <option value="SCHEDULED" th:text="#{campaigns.scheduled}">Scheduled</option>
                    <option value="SENDING" th:text="#{campaigns.sending}">Sending</option>
                    <option value="COMPLETED" th:text="#{campaigns.completed}">Completed</option>
                </select>
            </div>
            <div class="filter-group">
                <label th:text="#{campaigns.search}">Search</label>
                <input type="text" id="searchInput" placeholder="Campaign name...">
            </div>
            <div class="filter-group">
                <button onclick="applyFilters()"><i class="fas fa-filter"></i> <span
                        th:text="#{campaigns.filter}">Filter</span></button>
            </div>
            <button class="new-campaign-btn" onclick="openNewCampaignModal()"><i class="fas fa-plus"></i> <span
                    th:text="#{campaigns.new}">New Campaign</span></button>
        </div>

        <div class="campaigns-grid" id="campaignsGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> <span th:text="#{dashboard.loading}">Loading
                    campaigns...</span></div>
        </div>
    </div>

    <!-- Modal Nouvelle Campagne -->
    <div id="newCampaignModal" class="modal">
        <div class="modal-content">
            <h3 th:text="#{campaigns.new_campaign}">New Campaign</h3>
            <input type="text" id="campaignName" placeholder="Campaign name"
                th:placeholder="#{campaigns.name_placeholder}">
            <input type="text" id="campaignFolder" placeholder="Folder name"
                th:placeholder="#{campaigns.folder_placeholder}">
            <select id="newsletterId">
                <option value="">-- Select Newsletter --</option>
            </select>
            <input type="datetime-local" id="scheduledStart">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeNewCampaignModal()"
                    th:text="#{campaigns.cancel}">Cancel</button>
                <button class="btn-submit" onclick="createCampaign()" th:text="#{campaigns.create}">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/campaigns.js"></script>
</body>

</html>
