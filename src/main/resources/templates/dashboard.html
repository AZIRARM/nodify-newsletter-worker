<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{dashboard.title}">Nodify Newsletter</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
    <div class="container">
        <div class="lang-switch">
            <a href="?lang=fr">🇫🇷 Français</a> |
            <a href="?lang=en">🇬🇧 English</a> |
            <a href="?lang=es">🇪🇸 Español</a> |
            <a href="?lang=de">🇩🇪 Deutsch</a> |
            <a href="?lang=pt">🇵🇹 Português</a>
        </div>

        <!-- Navigation links -->
        <div class="nav-links">
            <a href="/" class="nav-link active"><i class="fas fa-tachometer-alt"></i> <span
                    th:text="#{dashboard.title}">Dashboard</span></a>
            <a href="/campaigns" class="nav-link"><i class="fas fa-list"></i> <span
                    th:text="#{campaigns.title}">Campaigns</span></a>
        </div>

        <div class="header">
            <h1><i class="fas fa-envelope-open-text"></i> <span th:text="#{dashboard.title}">Nodify Newsletter</span>
            </h1>
            <p th:text="#{dashboard.subtitle}">Campaign management & email tracking</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="totalUsers">0</h3>
                    <p th:text="#{dashboard.users}">Users</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-campaign"></i></div>
                <div class="stat-info">
                    <h3 id="totalCampaigns">0</h3>
                    <p th:text="#{dashboard.campaigns}">Campaigns</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
                <div class="stat-info">
                    <h3 id="totalSent">0</h3>
                    <p th:text="#{dashboard.sent}">Sent</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-eye"></i></div>
                <div class="stat-info">
                    <h3 id="totalOpened">0</h3>
                    <p th:text="#{dashboard.open_rate}">Open Rate</p>
                </div>
            </div>
        </div>

        <div class="section-title">
            <h2><i class="fas fa-list"></i> <span th:text="#{dashboard.recent_campaigns}">Recent Campaigns</span></h2>
            <div style="display: flex; gap: 15px;">
                <div class="export-import">
                    <a href="/export" class="btn-export"><i class="fas fa-download"></i> <span
                            th:text="#{dashboard.export}">Export JSON</span></a>
                    <form action="/import" method="post" enctype="multipart/form-data" class="import-form">
                        <label for="importFile" class="btn-import"><i class="fas fa-upload"></i> <span
                                th:text="#{dashboard.import}">Import JSON</span></label>
                        <input type="file" id="importFile" name="file" accept=".json" style="display: none;"
                            onchange="this.form.submit()">
                    </form>
                </div>
                <button class="btn-refresh" onclick="loadData()"><i class="fas fa-sync-alt"></i> <span
                        th:text="#{dashboard.refresh}">Refresh</span></button>
            </div>
        </div>

        <div class="campaigns-grid" id="campaignsGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> <span th:text="#{dashboard.loading}">Loading
                    campaigns...</span></div>
        </div>
    </div>

    <script src="/js/dashboard.js"></script>
</body>

</html>
