<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{newsletters.title}">Newsletters - Nodify Newsletter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/newsletters.css">
</head>

<body>
    <div th:replace="fragments/header :: header"></div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-newspaper"></i> <span th:text="#{newsletters.title}">Newsletters</span></h1>
            <p th:text="#{newsletters.subtitle}">Manage all your newsletter templates</p>
        </div>

        <div class="actions-bar">
            <button class="btn-primary" onclick="openNewsletterModal()"><i class="fas fa-plus"></i> <span
                    th:text="#{newsletters.create}">Create Newsletter</span></button>
            <button class="btn-secondary" onclick="refreshNewsletters()"><i class="fas fa-sync-alt"></i> <span
                    th:text="#{dashboard.refresh}">Refresh</span></button>

        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by title or code...">
            <button onclick="searchNewsletters()"><i class="fas fa-search"></i> <span
                    th:text="#{campaigns.search}">Search</span></button>
        </div>

        <div class="newsletters-grid" id="newslettersGrid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> <span
                    th:text="#{dashboard.loading}">Loading...</span></div>
        </div>
    </div>

    <!-- Modal Newsletter -->
    <div id="newsletterModal" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-newspaper"></i> <span th:text="#{newsletters.create}">Create
                        Newsletter</span></h3>
                <button class="modal-close" onclick="closeNewsletterModal()">&times;</button>
            </div>
            <form id="newsletterForm">
                <input type="hidden" id="newsletterId">
                <div class="form-group">
                    <label><span th:text="#{newsletter.code}">Code</span> *</label>
                    <input type="text" id="newsletterCode" placeholder="NEWSLETTER-001">
                    <small>Unique identifier for this newsletter</small>
                </div>
                <div class="form-group">
                    <label><span th:text="#{newsletter.title}">Title</span> *</label>
                    <input type="text" id="newsletterTitle" placeholder="My Awesome Newsletter">
                </div>
                <div class="form-group">
                    <label><span th:text="#{newsletter.subject}">Subject</span></label>
                    <input type="text" id="newsletterSubject" placeholder="Email subject line">
                </div>
                <div class="form-group">
                    <label><span th:text="#{newsletter.content}">HTML Content</span></label>
                    <textarea id="newsletterContent" rows="10"
                        placeholder="<h1>Hello</h1><p>Welcome to our newsletter...</p>"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeNewsletterModal()"><span
                            th:text="#{campaigns.cancel}">Cancel</span></button>
                    <button type="submit" class="btn-submit"><span th:text="#{campaigns.create}">Create</span></button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/newsletters.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.currentPage = 'newsletters';
        /*]]>*/
    </script>
</body>

</html>
