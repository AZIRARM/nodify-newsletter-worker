server:
  port: 8080

spring:
  application:
    name: nodify-newsletter-worker
  datasource:
    url: jdbc:h2:file:./data/nodify-newsletter-workerdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
      globally_quoted_identifiers: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
      test-connection: false

  thymeleaf:
    cache: false
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

nodify:
  api:
    url: ${NODIFY_API_URL:https://your-nodify-instance.com}
    
webhook:
  tracking-base-url: ${TRACKING_BASE_URL:https://your-domain.com}
  secret: ${WEBHOOK_SECRET:}

scheduler:
  check-interval-ms: 60000
  retry:
    default-interval-minutes: 60
    max-retries: 3

logging:
  level:
    com.nodify: DEBUG